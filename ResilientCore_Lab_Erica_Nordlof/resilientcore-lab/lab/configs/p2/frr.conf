frr version 10.2
frr defaults traditional
hostname p2
service integrated-vtysh-config
!
interface lo
 ip address 10.255.1.2/32
 ip router isis CORE
!
interface eth1
 ip address 10.0.12.0/31
 ip router isis CORE
 isis network point-to-point
!
interface eth2
 ip address 10.0.22.0/31
 ip router isis CORE
 isis network point-to-point
!
interface eth3
 ip address 10.0.31.1/31
 ip router isis CORE
 isis network point-to-point
!
router isis CORE
 net 49.0001.0000.0000.0012.00
 is-type level-2-only
 metric-style wide
 segment-routing on
 segment-routing global-block 16000 23999
