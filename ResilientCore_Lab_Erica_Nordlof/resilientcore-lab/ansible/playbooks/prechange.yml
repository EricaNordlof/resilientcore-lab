---
- name: Pre-change health snapshot
  hosts: all
  gather_facts: false
  tasks:
    - name: Capture interface brief
      ansible.netcommon.cli_command:
        command: show interface brief
      register: interfaces

    - name: Capture routing table
      ansible.netcommon.cli_command:
        command: show ip route
      register: routes

    - name: Save evidence locally
      ansible.builtin.copy:
        content: |
          HOST={{ inventory_hostname }}
          === INTERFACES ===
          {{ interfaces.stdout }}
          === ROUTES ===
          {{ routes.stdout }}
        dest: "./artifacts/{{ inventory_hostname }}-prechange.txt"
      delegate_to: localhost
