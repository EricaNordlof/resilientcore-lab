---
- name: Validate provider core state
  hosts: provider_edge:core
  gather_facts: false
  tasks:
    - name: Check IS-IS neighbors
      ansible.netcommon.cli_command:
        command: show isis neighbor
      register: isis_neighbors

    - name: Display IS-IS neighbors
      ansible.builtin.debug:
        var: isis_neighbors.stdout

- name: Validate VPN control plane on PE routers
  hosts: provider_edge
  gather_facts: false
  tasks:
    - name: Check VPNv4 BGP summary
      ansible.netcommon.cli_command:
        command: show bgp ipv4 vpn summary
      register: vpn_bgp

    - name: Check configured VRFs
      ansible.netcommon.cli_command:
        command: show vrf
      register: vrfs

    - name: Display control-plane state
      ansible.builtin.debug:
        msg:
          - "{{ vpn_bgp.stdout }}"
          - "{{ vrfs.stdout }}"
