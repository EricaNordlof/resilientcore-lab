---
- name: Pre-change health snapshot
  hosts: all
  gather_facts: false
  pre_tasks:
    - name: Ensure local artifacts directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../../artifacts"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

  tasks:
    - name: Capture interface brief
      ansible.netcommon.cli_command:
        command: show interface brief
      register: interfaces

    - name: Capture routing table
      ansible.netcommon.cli_command:
        command: show ip route
      register: routes

    - name: Save evidence locally
      ansible.builtin.copy:
        content: |
          HOST={{ inventory_hostname }}
          === INTERFACES ===
          {{ interfaces.stdout }}
          === ROUTES ===
          {{ routes.stdout }}
        dest: "{{ playbook_dir }}/../../artifacts/{{ inventory_hostname }}-prechange.txt"
        mode: '0644'
      delegate_to: localhost
